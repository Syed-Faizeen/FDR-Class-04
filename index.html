<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Class #04</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="flag-row">
		<div class="bd-bg">
			<div class="bd-fg"></div>
		</div>
		<div class="us-bg">
			<div class="us-first-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-stripe"></div>
			<div class="us-starbg">
				<img src="../Images/union_jack.png" class="union-jack">
			</div>
		</div>	
		<div class="indonesia-top">
			<div class="indonesia-bottom"></div>
		</div>
		<div class="br-bg">
			<div class="br-fg">
				<img src="../Images/america_cdi.webp" class="br-circle">
			</div>
		</div>
		<div class="et-bg">
			<div class="et-green"></div>
			<div class="et-yellow"></div>
			<div class="et-red"></div>

		</div>
	</div>
	<div class="flag-row">
		<div class="tr-bg">
			<img src="../Images/tr-emblem.png" class="tr-emblem">
		</div>
		<div class="ph-bg">
			<div class="ph-blue"></div>
			<div class="ph-red"></div>

				<div class="ph-star" style="top:31%;left:86%"></div>
				<div class="ph-star" style="top:57%;left:7%"></div>
				<img src="../Images/philippenes-sun.png" class="ph-sun">
			</div>
		</div>
		<div class="cg-bg">
			<div class="cg-green"></div>
			<div class="cg-red"></div>
		</div>
		<div class="cg-yellow"></div>	
		<div class="en-bg">
			<div class="en-horizontal"></div>
			<div class="en-vertical"></div>
		</div>
		<div class="ca-bg">
			<div class="ca-left"></div>
			<div class="ca-right"></div>
			<img src="../Images/ca-leaf.png" class="ca-leaf">
		</div>
	</div>
	<div class="flag-row">
		<div class="vn-bg">
			<div class="vn-star"></div>
		</div>
		<div class="cn-bg">
			<div class="cn-star-big"></div>
			<div class="cn-star-small" style="top:5px;left:60px"></div>
			<div class="cn-star-small" style="top:25px;left:70px"></div>
			<div class="cn-star-small" style="top:45px;left:70px"></div>
			<div class="cn-star-small" style="top:65px;left:60px"></div>
		</div>
		<div class="uz-bg">
			<div class="uz-blue">
				<img src="../Images/usbekistan_crescent.png" class="uz-moon">
				<div class="uz-star" style="left:42px;top:27px;"></div>
				<div class="uz-star" style="left:55px;top:27px;"></div>
				<div class="uz-star" style="left:68px;top:27px;"></div>
				<div class="uz-star" style="left:81px;top:27px;"></div>
				<div class="uz-star" style="left:94px;top:27px;"></div>
				<div class="uz-star" style="left:55px;top:17px;"></div>
				<div class="uz-star" style="left:68px;top:17px;"></div>
				<div class="uz-star" style="left:81px;top:17px;"></div>
				<div class="uz-star" style="left:94px;top:17px;"></div>
				<div class="uz-star" style="left:68px;top:7px;"></div>
				<div class="uz-star" style="left:81px;top:7px;"></div>
				<div class="uz-star" style="left:94px;top:7px;"></div>
			</div>
			<div class="uz-green"></div>
		</div>
		<div class="co-bg"> <!--Colombia-->
			<div class="co-blue"></div>
			<div class="co-red"></div>
		</div>
		<div class="ma-bg">
			<img src="../Images/Star_of_Morocco.png" class="ma-star">
		</div>
	</div>

</html>
